<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
</head>
<body style="background-color: black; color: white; text-align: center; margin-top: 15%;">

<h2>Kindly Register to proceed further!</h2>

<form action="register1" method="Post">
    <table>
        <tr>
            <td>User Name</td>
            <td><input type="text" name="uname" required></td>
        </tr>
        <tr>
            <td>User email</td>
            <td><input type="email" name="uemail" required></td>
        </tr>


        <tr>
            <td>Password</td>
            <td><input type="password" name="upass" required></td>
        </tr>
        <tr>
            <td>User City</td>
            <td><input type="text" name="ucity" required></td>
        </tr>

        <tr>
            <td></td>
            <td><input type="submit" value="Register1"></td>
        </tr>
    </table>
</form>

</body>
</html>
